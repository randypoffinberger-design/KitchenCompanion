<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" id="themeColorMeta" content="#7b3f00">
  <title>Kitchen Companion</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button id="menuBtn" class="icon-btn mobile-only" aria-label="Open navigation">☰</button>
      <div class="brand">
        <strong>Kitchen Companion</strong>
        <span id="moduleCount">0 modules</span>
      </div>
      <div class="top-actions">
        <button id="createRecipeBtn" class="button secondary">＋ Recipe</button>
        <button id="importBtn" class="button">Import module</button>
        <input id="moduleFile" type="file" accept=".json,.recipepack,application/json" hidden multiple>
        <button id="settingsBtn" class="icon-btn" aria-label="Settings">⚙</button>
      </div>
    </header>

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-search">
        <label for="searchInput">Search recipes</label>
        <input id="searchInput" type="search" placeholder="Name, ingredient, tag…" autocomplete="off">
      </div>

      <nav class="nav-section" aria-label="Library navigation">
        <button class="nav-item active" data-view="all">All recipes <span id="allCount">0</span></button>
        <button class="nav-item" data-view="favorites">Favorites <span id="favoriteCount">0</span></button>
        <button class="nav-item" data-view="modules">Modules <span id="navModuleCount">0</span></button>
      </nav>

      <div class="sidebar-heading">Categories</div>
      <div id="categoryList" class="category-list"></div>
    </aside>

    <div id="scrim" class="scrim"></div>

    <main class="main">
      <section id="listPane" class="list-pane">
        <div class="list-header">
          <div>
            <h1 id="viewTitle">All recipes</h1>
            <p id="viewSubtitle">Browse every enabled module.</p>
          </div>
          <select id="moduleFilter" aria-label="Filter by module">
            <option value="all">All modules</option>
          </select>
        </div>
        <div id="recipeGrid" class="recipe-grid"></div>
        <div id="emptyState" class="empty-state" hidden>
          <h2>No recipes found</h2>
          <p>Try a different search, category, or module.</p>
        </div>
      </section>

      <section id="detailPane" class="detail-pane" hidden>
        <button id="backBtn" class="back-btn">← Back to recipes</button>
        <article id="recipeDetail"></article>
      </section>

      <section id="modulesPane" class="modules-pane" hidden>
        <div class="list-header">
          <div>
            <h1>Recipe modules</h1>
            <p>Import, enable, disable, export, or uninstall recipe collections.</p>
          </div>
          <button id="moduleImportBtn" class="button">Import module</button>
        </div>
        <div id="moduleCards" class="module-cards"></div>
      </section>
    </main>
  </div>

  <dialog id="settingsDialog">
    <form method="dialog" class="dialog-card">
      <h2>Settings</h2>
      <label class="setting-row">
        <span>Dark mode</span>
        <input id="darkModeToggle" type="checkbox">
      </label>
      <label class="setting-row">
        <span>Show metric helper amounts</span>
        <input id="metricToggle" type="checkbox">
      </label>
      <div class="setting-block">
        <strong>Layout color</strong>
        <div class="color-presets" id="colorPresets">
          <button type="button" class="color-swatch" data-color="#7b3f00" style="--swatch:#7b3f00" aria-label="Brown"></button>
          <button type="button" class="color-swatch" data-color="#0ABAB5" style="--swatch:#0ABAB5" aria-label="Tiffany blue"></button>
          <button type="button" class="color-swatch" data-color="#2563EB" style="--swatch:#2563EB" aria-label="Blue"></button>
          <button type="button" class="color-swatch" data-color="#7C3AED" style="--swatch:#7C3AED" aria-label="Purple"></button>
          <button type="button" class="color-swatch" data-color="#15803D" style="--swatch:#15803D" aria-label="Green"></button>
          <button type="button" class="color-swatch" data-color="#BE123C" style="--swatch:#BE123C" aria-label="Rose"></button>
        </div>
        <label class="custom-color-row"><span>Custom color</span><input id="accentColorInput" type="color" value="#7b3f00"></label>
      </div>
      <div class="dialog-actions">
        <button class="button secondary" value="cancel">Close</button>
      </div>
    </form>
  </dialog>

  <dialog id="recipeEditorDialog">
    <form id="recipeEditorForm" class="dialog-card recipe-editor">
      <div class="dialog-title-row"><h2 id="recipeEditorTitle">Create recipe</h2><button type="button" class="icon-btn" id="closeRecipeEditor" aria-label="Close">✕</button></div>
      <input id="editRecipeKey" type="hidden">
      <label>Recipe name<input id="editName" required></label>
      <div class="form-grid"><label>Category<input id="editCategory" placeholder="Main Course"></label><label>Yield<input id="editYield" placeholder="4 servings"></label></div>
      <label>Description<textarea id="editDescription" rows="2"></textarea></label>
      <div class="form-grid"><label>Prep time<input id="editPrepTime" placeholder="15 minutes"></label><label>Cook time<input id="editCookTime" placeholder="30 minutes"></label></div>
      <label>Ingredients <small>One per line, such as: 1 1/2 cups flour</small><textarea id="editIngredients" rows="9" required></textarea></label>
      <label>Instructions <small>One step per line</small><textarea id="editInstructions" rows="9" required></textarea></label>
      <label>Tags <small>Separate with commas</small><input id="editTags"></label>
      <div class="dialog-actions"><button type="button" class="button secondary" id="cancelRecipeEditor">Cancel</button><button type="submit" class="button">Save recipe</button></div>
    </form>
  </dialog>

  <template id="recipeCardTemplate">
    <button class="recipe-card">
      <div class="recipe-card-topline">
        <span class="recipe-category"></span>
        <span class="recipe-favorite" aria-hidden="true">☆</span>
      </div>
      <h2 class="recipe-name"></h2>
      <p class="recipe-description"></p>
      <div class="recipe-meta"></div>
      <small class="recipe-source"></small>
    </button>
  </template>

  <script src="app.js"></script>
</body>
</html>
